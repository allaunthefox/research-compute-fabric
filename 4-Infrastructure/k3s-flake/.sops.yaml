# SOPS configuration for k3s-flake
# Uses age for encryption (DEFAULT for all secrets in this directory).
#
# Usage:
#   sops --encrypt --in-place <file>
#   sops <file>                    # decrypt, edit, re-encrypt
#   sops --decrypt <file>          # decrypt to stdout

keys:
  - &admin age1tp4vr565zkmvnyulatpyaj6z8zrz7q9mpaypz85yz8rty99crdasualxyr

creation_rules:
  # Age-encrypted files in secrets/ directory
  - path_regex: secrets/.*\.age$
    key_groups:
      - age:
          - *admin

  # Any file with "secret" in the name
  - path_regex: secrets/.*secret.*
    key_groups:
      - age:
          - *admin

  # Environment files in secrets/
  - path_regex: secrets/.*\.env$
    key_groups:
      - age:
          - *admin

  # Catch-all for any .age file in this subtree
  - path_regex: .*\.age$
    key_groups:
      - age:
          - *admin
