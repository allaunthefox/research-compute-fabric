apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes
  namespace: services
  labels:
    app: hermes
spec:
  replicas: 1
  selector:
    matchLabels:
      app: hermes
  template:
    metadata:
      labels:
        app: hermes
    spec:
      containers:
        - name: hermes
          image: nginx:alpine
          ports:
            - containerPort: 80
              name: http
          volumeMounts:
            - name: placeholder-page
              mountPath: /usr/share/nginx/html
          resources:
            requests:
              memory: 32Mi
              cpu: 10m
            limits:
              memory: 64Mi
      volumes:
        - name: placeholder-page
          configMap:
            name: hermes-placeholder
