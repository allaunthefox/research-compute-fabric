apiVersion: apps/v1
kind: Deployment
metadata:
  name: homarr
  namespace: services
  labels:
    app: homarr
spec:
  replicas: 1
  selector:
    matchLabels:
      app: homarr
  template:
    metadata:
      labels:
        app: homarr
    spec:
      containers:
        - name: homarr
          image: ghcr.io/homarr-labs/homarr:v1.62.0
          ports:
            - containerPort: 7575
          volumeMounts:
            - name: data
              mountPath: /app/data
          env:
            - name: HOMARR_ALLOW_ANALYTICS
              value: "false"
            - name: SECRET_ENCRYPTION_KEY
              value: "93776b84d86fbc810709cf7cf9b243afbb2b9cb19603af8b1a696373467dc583"
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: homarr-data
