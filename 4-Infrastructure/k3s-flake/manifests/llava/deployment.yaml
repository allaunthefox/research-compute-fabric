# Llava-1.5-7B Vision-Language Model Deployment
# Multimodal model for image understanding and Q&A
#
# Architecture:
#   Hermes (orchestrator) -> llava-model (vision specialist) -> response
#
# Model specs:
#   - Llava-1.5-7B: Vision-language model
#   - Quantization: Q4_K_M (~4GB for text model + ~1GB mmproj = ~5GB total)
#   - Context window: 32K tokens
#   - Vision resolution: 336x336 (default), up to 1024x1024
#   - ARM64 compatible via llama.cpp
#
# REQUIREMENTS:
#   This deployment needs THREE files in /home/allaun/Downloads/llava/:
#   1. llava-1.5-7b-q4_k_m.gguf (main model, ~4GB)
#   2. mmproj-model-f16.bin (vision projection, ~1GB)
#   3. tokenizer.model (optional, for better tokenization)
#
# Total memory: ~5-7GB (model + mmproj + overhead)
# Total storage: ~5GB
#
# Note: Llava uses the --mmproj flag to load the vision projection model.
# Images are passed via the API as base64-encoded data.

apiVersion: apps/v1
kind: Deployment
metadata:
  name: llava-model
  namespace: services
  labels:
    app: llava-model
    role: specialist-tool
    tool-type: vision
spec:
  replicas: 1
  selector:
    matchLabels:
      app: llava-model
  strategy:
    type: Recreate  # Clean restart when model files change
  template:
    metadata:
      labels:
        app: llava-model
        role: specialist-tool
        tool-type: vision
    spec:
      # Run on neon-64gb ARM64 node
      nodeSelector:
        kubernetes.io/arch: arm64
        topology.researchstack.io/role: neon
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "gpu"
          effect: "NoSchedule"
      containers:
        - name: llava-1.5-7b
          # Official llama.cpp container with ARM64 support
          image: ghcr.io/ggerganov/llama.cpp:main
          command:
            - "llama-server"
            - "-m"
            - "/models/llava/llava-1.5-7b-q4_k_m.gguf"
            - "--mmproj"
            - "/models/llava/mmproj-model-f16.bin"
            - "-c"
            - "32768"  # 32K context window
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--threads"
            - "4"
            - "--n-gpu-layers"
            - "0"  # CPU-only mode (ARM64, no NVIDIA GPU)
            - "--log-disable"  # Reduce log noise
            - "--cont-batch"
            - "256"  # Smaller batch for vision tasks
            - "--n-batch"
            - "256"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: MODEL_PATH
              value: "/models/llava/llava-1.5-7b-q4_k_m.gguf"
            - name: MMPROJ_PATH
              value: "/models/llava/mmproj-model-f16.bin"
            - name: MODEL_NAME
              value: "llava-1.5-7b"
            - name: CONTEXT_WINDOW
              value: "32768"
            - name: MAX_TOKENS
              value: "2048"
            - name: IMAGE_RESOLUTION
              value: "512"  # Process images at 512x512
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            requests:
              memory: "5Gi"
              cpu: "1"
            limits:
              memory: "7Gi"
              cpu: "2"
          # Startup probe - vision model loading takes time
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 25
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 15
            successThreshold: 1
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 45
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Security context
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: models
          # hostPath to llava directory on neon-64gb
          # REQUIRED FILES:
          #   /home/allaun/Downloads/llava/llava-1.5-7b-q4_k_m.gguf
          #   /home/allaun/Downloads/llava/mmproj-model-f16.bin
          hostPath:
            path: /home/allaun/Downloads
            type: Directory
