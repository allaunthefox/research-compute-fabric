# Kustomization for Llava-1.5-7B Vision-Language Model
# Applies deployment + service for image understanding
#
# Usage:
#   kubectl apply -k manifests/llava/
#
# PREREQUISITES:
#   Three files MUST exist on neon-64gb at /home/allaun/Downloads/llava/:
#   1. llava-1.5-7b-q4_k_m.gguf      (~4GB, main model weights)
#   2. mmproj-model-f16.bin          (~1GB, vision projection layer)
#   3. tokenizer.model              (optional, ~100MB, for better tokenization)
#
# Download links:
#   Main model: https://huggingface.co/llava-hf/llava-1.5-7b-GGUF/resolve/main/llava-1.5-7b-q4_k_m.gguf
#   mmproj:     https://huggingface.co/llava-hf/llava-1.5-7b-GGUF/resolve/main/mmproj-model-f16.bin
#
# Total resource usage on neon-64gb:
#   - Storage: ~5GB
#   - Memory: ~5-7GB (model + mmproj + overhead)
#   - CPU: 1-2 cores
#
# Can coexist with:
#   - DeepSeek-Coder-6.7B (~8GB)    Total: ~13-15GB
#   - Qwen2-7B (~6GB)              Total: ~18-20GB
#   - Hermes model (~8GB)           Total: ~26-28GB (fits in 32GB)

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

# Common labels for all resources
commonLabels:
  component: llava-model
  tier: backend
  role: specialist-tool
  tool-type: vision
