# Llava-1.5-7B Vision-Language Model Service
# ClusterIP for internal Kubernetes DNS
# Called by Hermes orchestrator at: http://llava-model.services.svc.cluster.local
#
# Endpoints:
#   POST /v1/chat/completions - OpenAI-compatible endpoint (accepts images)
#   GET  /v1/models            - List loaded models
#   GET  /health               - Health check
#
# Image input format:
#   Images must be base64-encoded and included in the messages array:
#   {
#     "role": "user",
#     "content": [
#       {"type": "text", "text": "What's in this image?"},
#       {"type": "image_url", "image_url": "data:image/jpeg;base64,<base64_data>"}
#     ]
#   }

apiVersion: v1
kind: Service
metadata:
  name: llava-model
  namespace: services
  labels:
    app: llava-model
    role: specialist-tool
    tool-type: vision
spec:
  type: ClusterIP
  selector:
    app: llava-model
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
