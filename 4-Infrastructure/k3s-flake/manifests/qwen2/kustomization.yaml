# Kustomization for Qwen2-7B Model deployment
# Applies deployment + service for the Qwen2-7B specialist tool
#
# Usage:
#   kubectl apply -k manifests/qwen2/
#
# Prerequisites:
#   - Model file at /home/allaun/Downloads/Qwen2-7B-Instruct-Q4_K_M.gguf on neon-64gb
#   - neon-64gb node joined to cluster with labels:
#     kubernetes.io/arch: arm64
#     topology.researchstack.io/role: neon
#
# Resource usage:
#   - Memory: ~4-6GB
#   - CPU: 1-2 cores
#   - Storage: ~4GB (model file)
#
# Can coexist with:
#   - DeepSeek-Coder-6.7B (~8GB) - Total: ~12-14GB
#   - Hermes model (~8GB) - Total: ~20-22GB (fits in 32GB)

apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - deployment.yaml
  - service.yaml

# Common labels for all resources
commonLabels:
  component: qwen2-model
  tier: backend
  role: specialist-tool
  tool-type: general
