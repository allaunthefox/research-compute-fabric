# Qwen2-7B Model Service - ClusterIP for internal Kubernetes DNS
# Called by Hermes orchestrator at: http://qwen2-model.services.svc.cluster.local
#
# This service is NOT exposed publicly. It's only accessible:
# - Within the k3s cluster (other pods in same namespace)
# - By Hermes pod (orchestrator) for tool calling
#
# Comparison with coder-model:
#   - coder-model: DeepSeek-Coder-6.7B (specialized for code, low temp=0.1)
#   - qwen2-model: Qwen2-7B-Instruct (general purpose, balanced temp=0.7)
#
# Endpoints:
#   POST /v1/chat/completions - OpenAI-compatible chat endpoint
#   GET  /v1/models            - List loaded models
#   GET  /health               - Health check

apiVersion: v1
kind: Service
metadata:
  name: qwen2-model
  namespace: services
  labels:
    app: qwen2-model
    role: specialist-tool
    tool-type: general
spec:
  type: ClusterIP
  selector:
    app: qwen2-model
  ports:
    - name: http
      port: 80
      targetPort: 8000
      protocol: TCP
