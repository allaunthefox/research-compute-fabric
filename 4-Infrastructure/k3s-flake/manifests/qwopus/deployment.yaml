# Qwopus3.5-9B-Coder-MTP Model Deployment
# Coder-specialized model optimized for code generation tasks
# Runs alongside DeepSeek-Coder for A/B testing and specialized use cases
#
# Architecture:
#   Hermes (orchestrator) -> qwopus-model (generation specialist)
#   Hermes (orchestrator) -> coder-model (analysis specialist)
#
# Model specs:
#   - Qwopus3.5-9B-Coder-MTP: 9B parameters, GGUF format
#   - Quantization: Q4_K_M (~4.5GB)
#   - Strength: Code generation, completion, multi-turn programming
#   - Context window: 32K tokens
#   - ARM64 compatible via llama.cpp
#
# Comparison with DeepSeek-Coder:
#   - Qwopus: Better at code GENERATION (writing new code)
#   - DeepSeek: Better at code ANALYSIS (reviewing existing code)
#
# Resource usage:
#   - Memory: 5-6GB
#   - CPU: 1-2 cores
#   - Storage: ~4.5GB

apiVersion: apps/v1
kind: Deployment
metadata:
  name: qwopus-model
  namespace: services
  labels:
    app: qwopus-model
    role: specialist-tool
    tool-type: coder
    coder-type: generation  # vs DeepSeek = analysis
spec:
  replicas: 1
  selector:
    matchLabels:
      app: qwopus-model
  strategy:
    type: Recreate  # Clean restart when model changes
  template:
    metadata:
      labels:
        app: qwopus-model
        role: specialist-tool
        tool-type: coder
        coder-type: generation
    spec:
      # Run on neon-64gb ARM64 node
      nodeSelector:
        kubernetes.io/arch: arm64
        topology.researchstack.io/role: neon
      tolerations:
        - key: "dedicated"
          operator: "Equal"
          value: "gpu"
          effect: "NoSchedule"
      containers:
        - name: qwopus-9b-coder
          # Official llama.cpp container with ARM64 support
          image: ghcr.io/ggerganov/llama.cpp:main
          command:
            - "llama-server"
            - "-m"
            - "/models/Qwopus3.5-9B-Coder-MTP-Q4_K_M.gguf"
            - "-c"
            - "32768"  # 32K context for long code sequences
            - "--host"
            - "0.0.0.0"
            - "--port"
            - "8000"
            - "--threads"
            - "4"
            - "--n-gpu-layers"
            - "0"  # CPU-only mode (ARM64 has no NVIDIA GPU)
            - "--log-disable"
            - "--cont-batch"
            - "512"
            - "--n-batch"
            - "512"
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
          env:
            - name: MODEL_PATH
              value: "/models/Qwopus3.5-9B-Coder-MTP-Q4_K_M.gguf"
            - name: MODEL_NAME
              value: "qwopus-9b-coder-mtp"
            - name: CONTEXT_WINDOW
              value: "32768"
            - name: MAX_TOKENS
              value: "4096"
            - name: TEMPERATURE
              value: "0.7"  # Balanced for generation
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
          resources:
            requests:
              memory: "5Gi"
              cpu: "1"
            limits:
              memory: "6Gi"
              cpu: "2"
          # Startup probe - model loading takes time
          startupProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 12
            successThreshold: 1
          # Liveness probe
          livenessProbe:
            httpGet:
              path: /health
              port: 8000
            initialDelaySeconds: 30
            periodSeconds: 30
            timeoutSeconds: 5
            failureThreshold: 3
          # Readiness probe
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8000
            initialDelaySeconds: 20
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 3
          # Security context
          securityContext:
            runAsNonRoot: true
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
      volumes:
        - name: models
          # Primary: hostPath to neon's Downloads directory
          # Model: /home/allaun/Downloads/Qwopus3.5-9B-Coder-MTP-Q4_K_M.gguf
          hostPath:
            path: /home/allaun/Downloads
            type: Directory
