apiVersion: ray.io/v1
kind: RayCluster
metadata:
  name: raycluster
  namespace: ray-system
spec:
  rayVersion: "2.40.0"
  headGroupSpec:
    serviceType: ClusterIP
    rayStartParams:
      num-cpus: "0"
      dashboard: "false"
    template:
      spec:
        containers:
        - name: ray-head
          image: rayproject/ray:2.40.0
          ports:
          - containerPort: 6379
            name: gcs
          - containerPort: 8265
            name: dashboard
          - containerPort: 10001
            name: client
          - containerPort: 8000
            name: serve
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
          - name: dshm
            mountPath: /dev/shm
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        nodeSelector:
          kubernetes.io/hostname: steamdeck
  workerGroupSpecs:
  - replicas: 1
    minReplicas: 0
    maxReplicas: 2
    groupName: workers
    rayStartParams:
      num-cpus: "2"
    template:
      spec:
        containers:
        - name: ray-worker
          image: rayproject/ray:2.40.0
          resources:
            requests:
              cpu: "2"
              memory: "4Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          volumeMounts:
          - name: dshm
            mountPath: /dev/shm
        volumes:
        - name: dshm
          emptyDir:
            medium: Memory
            sizeLimit: 2Gi
        nodeSelector:
          kubernetes.io/hostname: steamdeck
