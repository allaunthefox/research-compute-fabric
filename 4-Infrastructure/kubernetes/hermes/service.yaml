apiVersion: v1
kind: Service
metadata:
  name: hermes-service
  namespace: hermes
  labels:
    app: hermes
    component: orchestrator
spec:
  selector:
    app: hermes
    component: orchestrator
  ports:
  - port: 8000
    targetPort: 8000
    name: http
  - port: 9090
    targetPort: 9090
    name: metrics
