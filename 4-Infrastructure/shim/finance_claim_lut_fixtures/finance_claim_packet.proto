syntax = "proto3";

package research_stack.finance;

message FinancialClaimPacket {
  string id = 1;
  string claimant = 2;
  string counterparty = 3;
  string principal = 4;
  string currency = 5;
  string rate = 6;
  string maturity = 7;
  string collateral = 8;
  string jurisdiction = 9;
  string risk = 10;
  string settlement_path = 11;
  string receipt = 12;
}
