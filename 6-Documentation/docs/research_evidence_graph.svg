  <!-- Conclusion Section -->
  <text x="50" y="420" class="section-title">Conclusion</text>
  <rect x="50" y="435" width="950" height="50" fill="#f0f8ff" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="455" class="cell-text">Invariance principles provide a powerful unifying framework across classical wave equations, quantum wave equations,</text>
  <text x="60" y="475" class="cell-text">and modern machine learning approaches. The strongest evidence supports symmetry-based derivations, while noncommutative</text>
  <text x="60" y="495" class="cell-text">generalizations represent a promising frontier requiring further development.</text>

