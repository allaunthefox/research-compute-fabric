  <!-- Open Research Questions -->
  <text x="50" y="870" class="section-title">Open Research Questions</text>

  <!-- Question 1 -->
  <rect x="50" y="890" width="950" height="70" class="cell-bg-alt" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="910" class="question-text">Q1: How can noncommutative invariant theory be systematically integrated with classical wave equation derivations?</text>
  <text x="60" y="930" class="why-text">Why: Current approaches are ad-hoc and lack a unified framework for connecting noncommutative algebra to wave physics.</text>
  <text x="60" y="950" class="why-text">This integration could reveal new conservation laws and symmetry structures.</text>

  <!-- Question 2 -->
  <rect x="50" y="960" width="950" height="70" class="cell-bg" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="980" class="question-text">Q2: What scalable computational methods can handle the complexity of group-invariant ML models for high-dimensional systems?</text>
  <text x="60" y="1000" class="why-text">Why: Current methods scale poorly with dimensionality and group size, limiting practical applications.</text>
  <text x="60" y="1020" class="why-text">Hierarchical decomposition and approximation techniques are needed.</text>

  <!-- Question 3 -->
  <rect x="50" y="1030" width="950" height="70" class="cell-bg-alt" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="1050" class="question-text">Q3: Can hybrid approaches combining classical, quantum, and ML perspectives reveal new physics beyond individual frameworks?</text>
  <text x="60" y="1070" class="why-text">Why: Each framework has blind spots; hybrid methods could uncover phenomena invisible to single approaches.</text>
  <text x="60" y="1090" class="why-text">Cross-pollination between fields is historically fruitful but underexplored here.</text>

  <!-- Evidence Strength Legend -->
