# Research Stack Mathematical Claim Registry
# -----------------------------------------------------------------------------
# Single source of truth for tracked mathematical claims and their current
# rigor level. See docs/math-first-tooling.md for the math-first contract.
#
# Schema (per entry):
#   id:            slug, kebab-case, stable across renames.
#   title:         one-line natural-language statement of the claim.
#   status:        one of:
#                    conjecture          - asserted, no machine evidence yet
#                    verified-by-ai      - has at least one DeepSeek review
#                                          receipt and human spot-check
#                    formally-proven     - Lean proof builds in lake
#                    published           - peer-reviewed publication exists
#   lean:          (optional) repo-relative Lean source or `theorem` symbol
#                  that carries the proof obligation.
#   review_receipts:
#                  (optional) list of repo-relative `*.receipt.json` paths
#                  emitted by ollama_deepseek_review_emitter.py.
#   sources:       (optional) list of repo-relative supporting docs, scripts,
#                  or external citations.
#   notes:         (optional) free-form prose; keep short.
#
# The math-check CI workflow validates this file against the corresponding
# JSON Schema at shared-data/schemas/claims-registry.schema.json (see
# docs/math-first-tooling.md).
# -----------------------------------------------------------------------------

claims:
