      The prime-gap entropy-collapse detector rarely survives the corrected
      K=21 selective braid threshold.
    status: verified-by-ai
    lean: 0-Core-Formalism/lean/Semantics/Semantics/HCMMR/Kernels/EntropyCollapseDetector.lean
    review_receipts:
      - shared-data/artifacts/deepseek_review/prime_gap_entropy_collapse_deepseek_deepseek-v3.2_20260512T033551Z.receipt.json
      - shared-data/artifacts/deepseek_review/prime_gap_entropy_collapse_deepseek_deepseek-v4-flash_continuation_20260512T033849Z.receipt.json
    sources:
      - 6-Documentation/docs/distilled/ArithmeticSpec_Corrected_2026-05-11.md
      - shared-data/data/stack_solidification/prime_gap_k21_rerun_receipt_2026-05-11.md
    notes: >-
      Continuation receipt covers the truncated tail of the primary review.
      K=21 is the selective braid crossing threshold, not an entropy
